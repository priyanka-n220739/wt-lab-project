<div class="container">

<h1>Students</h1>

<input id="id" placeholder="Student ID">
<input id="name" placeholder="Name">
<input id="dept" placeholder="Department">

<button onclick="addStudent()">Add Student</button>

<table id="table">

<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Action</th>
</tr>

</table>

</div>

<script>

function addStudent(){

var table=document.getElementById("table")

var row=table.insertRow()

row.insertCell(0).innerHTML=document.getElementById("id").value
row.insertCell(1).innerHTML=document.getElementById("name").value
row.insertCell(2).innerHTML=document.getElementById("dept").value

var btn=document.createElement("button")
btn.innerHTML="Delete"
btn.className="delete"

btn.onclick=function(){
row.remove()
}

row.insertCell(3).appendChild(btn)

}

</script>

</body>
</html>
