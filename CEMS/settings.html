<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#dae0e6,#b3d4ff);
margin:0;
padding:0;
}

.container{
width:60%;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

.profile-section{
text-align:center;
margin-bottom:20px;
}

.profile-section img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #5fa8ff;
}

.profile-buttons{
    
margin-top:10px;
}

.profile-buttons button{
padding:6px 12px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.upload{
background:#4CAF50;
color:white;
}

.delete{
background:#f44336;
color:white;
}

.form-group{
margin-bottom:15px;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input,textarea{
width:100%;
padding:8px;
border-radius:5px;
border:1px solid #ccc;
}

.skills-container{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.skill{
background:#5fa8ff;
color:white;
padding:5px 10px;
border-radius:15px;
display:flex;
align-items:center;
}

.skill span{
margin-left:8px;
cursor:pointer;
}

.add-skill{
display:flex;
margin-top:10px;
}

.add-skill input{
flex:1;
}

.add-skill button{
padding:8px;
background:#5fa8ff;
color:white;
border:none;
margin-left:5px;
border-radius:5px;
cursor:pointer;
}

.save-btn{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Profile Settings</h2>

<div class="profile-section">

<img id="profilePreview" src="https://via.placeholder.com/120">

<div class="profile-buttons">
<input type="file" id="profileInput" hidden>
<button class="upload" onclick="uploadImage()">Upload</button>
<button class="delete" onclick="deleteImage()">Delete</button>
</div>

</div>

<div class="form-group">
<label>Name</label>
<input type="text" placeholder="Enter your name">
</div>

<div class="form-group">
<label>Student ID</label>
<input type="text" placeholder="Enter your ID">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" placeholder="Enter phone number">
</div>

<div class="form-group">
<label>Department</label>
<input type="text" placeholder="CSE / IT / ECE">
</div>

<div class="form-group">
<label>Bio</label>
<textarea rows="3" placeholder="Tell about yourself"></textarea>
</div>

<div class="form-group">

<label>Skills</label>

<div class="skills-container" id="skillsContainer"></div>

<div class="add-skill">
<input type="text" id="skillInput" placeholder="Add skill">
<button onclick="addSkill()">Add</button>
</div>

</div>

<button class="save-btn">Save Changes</button>

</div>

<script>

function uploadImage(){
document.getElementById("profileInput").click();
}

document.getElementById("profileInput").addEventListener("change",function(){

const file=this.files[0];
if(file){

const reader=new FileReader();

reader.onload=function(e){
document.getElementById("profilePreview").src=e.target.result;
}

reader.readAsDataURL(file);
}

});

function deleteImage(){

document.getElementById("profilePreview").src="https://via.placeholder.com/120";

}

function addSkill(){

const skillInput=document.getElementById("skillInput");
const skillText=skillInput.value.trim();

if(skillText==="") return;

const skill=document.createElement("div");
skill.className="skill";

skill.innerHTML=skillText+" <span onclick='removeSkill(this)'>✖</span>";

document.getElementById("skillsContainer").appendChild(skill);

skillInput.value="";

}

function removeSkill(element){

element.parentElement.remove();

}

</script>

</body>
</html>
