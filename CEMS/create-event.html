<div class="container">

<h1>Create New Event</h1>

<form>

<label>Event Name</label>
<input id="name" placeholder="Enter event name">

<label>Event Date</label>
<input id="date" type="date">

<label>Venue</label>
<input id="venue" placeholder="Enter venue">

<label>Event Category</label>
<select id="category">
<option>Technical</option>
<option>Cultural</option>
<option>Sports</option>
<option>Workshop</option>
</select>

<label>Description</label>
<textarea id="description" placeholder="Event description"></textarea>

<label>Max Participants</label>
<input id="limit" type="number" placeholder="Max participants">

<label>Upload Poster</label>
<input type="file">

<br><br>

<button type="button" onclick="createEvent()">Create Event</button>

</form>

</div>

</body>
