<!DOCTYPE html>
<html>

<head>

<title>Department Events</title>

<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

/* Page title */
.heading{
text-align:center;
margin-top:40px;
margin-bottom:20px;
}

.heading h1{
font-size:40px;
font-weight:bold;
background: linear-gradient(90deg,#007BFF,#00C6FF);
-webkit-background-clip:text;
color:transparent;
}

.departments{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:40px;
}

.department-card{
width:280px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.department-card:hover{
transform:scale(1.05);
}

.department-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

select{
width:100%;
padding:8px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

.btn{
background:#007BFF;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
width:100%;
}

.btn:hover{
background:#0056b3;
}

.delete-btn{
background:#dc3545;
}

.delete-btn:hover{
background:#a71d2a;
}

.register-btn{
background:#28a745;
}

.register-btn:hover{
background:#1e7e34;
}

</style>

<script>
function addEvent(selectId){
    let eventName = prompt("Enter new event name");
    if(eventName){
        let select = document.getElementById(selectId);
        let option = document.createElement("option");
        option.text = eventName;
        select.add(option);
        alert("Event Added");
    }
}

function deleteEvent(selectId){
    let select = document.getElementById(selectId);
    if(select.selectedIndex > 0){
        select.remove(select.selectedIndex);
        alert("Event Deleted");
    } else {
        alert("Select an event to delete");
    }
}
</script>

</head>

<body>

<div class="navbar">
<div class="logo">CollegeEvents</div>

<ul class="nav-links">
<li><a href="home.html"><i class="fas fa-home"></i> Home</a></li>
<li><a href="#"><i class="fas fa-th-large"></i> Dashboard</a></li>
<li><a href="about.html"><i class="fas fa-info-circle"></i> About Us</a></li>
<li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
</ul>

</div>

<div class="heading">
<h1>Department Events</h1>
</div>

<div class="departments">

<!-- CSE -->
<div class="department-card">

<img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=600">

<h2>CSE Department</h2>
<p>Select an event conducted by the CSE department.</p>

<select id="cseEvents">
<option>Choose Event</option>
<option>Coding Contest</option>
<option>Hackathon</option>
<option>AI Workshop</option>
<option>Web Development Challenge</option>
</select>

<button class="btn" onclick="addEvent('cseEvents')">Add Event</button>
<button class="btn delete-btn" onclick="deleteEvent('cseEvents')">Delete Event</button>
<a href="register-event.html"><button class="btn register-btn">Register</button></a>

</div>

<!-- ECE -->
<div class="department-card">

<img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758?w=600">

<h2>ECE Department</h2>
<p>Select an event conducted by the ECE department.</p>

<select id="eceEvents">
<option>Choose Event</option>
<option>Robotics Competition</option>
<option>Circuit Debugging</option>
<option>IoT Workshop</option>
<option>Embedded Systems Challenge</option>
</select>

<button class="btn" onclick="addEvent('eceEvents')">Add Event</button>
<button class="btn delete-btn" onclick="deleteEvent('eceEvents')">Delete Event</button>
<a href="register-event.html"><button class="btn register-btn">Register</button></a>

</div>

<!-- Mechanical -->
<div class="department-card">

<img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?auto=format&fit=crop&w=600&q=80">

<h2>Mechanical Department</h2>
<p>Select an event conducted by the Mechanical department.</p>

<select id="mechEvents">
<option>Choose Event</option>
<option>CAD Design Competition</option>
<option>Robo Race</option>
<option>Machine Design</option>
<option>Automobile Workshop</option>
</select>

<button class="btn" onclick="addEvent('mechEvents')">Add Event</button>
<button class="btn delete-btn" onclick="deleteEvent('mechEvents')">Delete Event</button>
<a href="register-event.html"><button class="btn register-btn">Register</button></a>

</div>

</div>

</body>

</html>
