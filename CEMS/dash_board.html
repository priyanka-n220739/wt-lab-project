<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Campus Events</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-user-graduate"></i> CAMPUS EVENTS
            </div>
            <ul class="sidebar-links">
                <li><a href="home.html"><i class="fas fa-home"></i> Home</a></li>
                <li class="active"><a href="#"><i class="fas fa-th-large"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-info-circle"></i> About Us</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
                <li><a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <h1>Admin Dashboard</h1>
            <div class="dashboard-cards">
                <div class="card">
                    <div class="card-icon"><i class="fas fa-calendar-alt"></i></div>
                    <div class="card-info">
                        <h2>12</h2>
                        <p>Upcoming Events</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="fas fa-users"></i></div>
                    <div class="card-info">
                        <h2>250</h2>
                        <p>Participants</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="fas fa-file-signature"></i></div>
                    <div class="card-info">
                        <h2>30</h2>
                        <p>Registrations Today</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="fas fa-envelope"></i></div>
                    <div class="card-info">
                        <h2>15</h2>
                        <p>Messages</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
