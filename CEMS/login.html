 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<script>
    function loginsuccess(){
        alert("login successfull");
        window.location.href="home.html";
    }
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://www.shutterstock.com/image-photo/blurred-background-vibrant-scene-showcasing-600nw-2577243207.jpg");
background-size:cover;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

/* slide from left */

.form-box{
position:absolute;
left:-500px;
width:360px;
padding:40px;
border-radius:15px;
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
box-shadow:0 0 30px rgba(0,0,0,0.4);
animation:slideLeft 1s forwards;
color:white;
}

@keyframes slideLeft{
from{
left:-500px;
}
to{
left:50%;
transform:translateX(-50%);
}
}

h2{
text-align:center;
margin-bottom:25px;
}

.input-box{
position:relative;
margin:20px 0;
}

.input-box input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:5px;
background:rgba(255,255,255,0.2);
color:white;
}

.input-box label{
position:absolute;
left:10px;
top:12px;
color:white;
transition:0.3s;
}

.input-box input:focus + label,
.input-box input:valid + label{
top:-10px;
font-size:12px;
color:steelblue;
}

.input-box input:focus{
box-shadow:0 0 10px slateblue;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:olivedrab;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.back{
display:block;
text-align:center;
margin-top:15px;
color:white;
text-decoration:none;
}

</style>
</head>

<body>
<div class="overlay"></div>

<div class="form-box">

<h2>Login</h2>

<form>

<div class="input-box">
<input type="email" required>
<label>Email</label>
</div>

<div class="input-box">
<input type="password" required>
<label>Password</label>
</div>

<button type="button" onclick="loginsuccess()">Login</button>

<a href="landing.html" class="back">⬅ Back</a>

</form>

</div>

</body>
</html>
